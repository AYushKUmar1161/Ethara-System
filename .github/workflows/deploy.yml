name: Ethara CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ============================================================
  # Job 1: Backend Tests (uses in-memory SQLite via conftest.py)
  # ============================================================
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Backend Tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: testsecretkey123forcicd
          ENVIRONMENT: test
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -v --tb=short

  # ============================================================
  # Job 2: Frontend Build
  # ============================================================
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Build Next.js (production)
        env:
          NEXT_PUBLIC_API_URL: https://ethara-backend.onrender.com/api/v1
          BACKEND_URL: http://localhost:8000
        run: |
          cd frontend
          npm run build

      - name: Verify build output
        run: |
          ls -la frontend/.next/
          echo "Build successful ✓"

  # ============================================================
  # Job 3: Docker Build & Push to GHCR (main branch only)
  # ============================================================
  docker-build-and-push:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4: Deploy Frontend to Vercel
  # Only runs if VERCEL_TOKEN secret is configured
  # ============================================================
  deploy-frontend-vercel:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.VERCEL_TOKEN != ''
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

  # ============================================================
  # Job 5: Trigger Backend Redeploy on Render
  # Only runs if RENDER_DEPLOY_HOOK_URL secret is configured
  # ============================================================
  deploy-backend-render:
    needs: [docker-build-and-push]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.RENDER_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Render Deploy Webhook
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render webhook response: $HTTP_CODE"
          if [[ "$HTTP_CODE" == 2* ]]; then
            echo "Render deploy triggered ✓"
          else
            echo "Warning: Render webhook returned $HTTP_CODE — check RENDER_DEPLOY_HOOK_URL secret"
            exit 0
          fi
